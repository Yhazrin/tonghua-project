# ============================================
# VICOO — Easy Deploy Docker Compose
# One-command local deployment: docker compose up -d
# ============================================

services:
  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: vicoo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - vicoo-net

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: vicoo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - vicoo-net

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ../../
      dockerfile: deploy/easy/backend.dockerfile
    container_name: vicoo-backend
    working_dir: /app/backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:8080,http://127.0.0.1:5173}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_EDITOR_PASSWORD: ${SEED_EDITOR_PASSWORD}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD}
      MOCK_USER_PASSWORD: ${MOCK_USER_PASSWORD}
      # For entrypoint.sh -- MySQL connection
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vicoo-net
    volumes:
      - ./data:/data
      # Mount source code for hot reload (development only)
      - ../../backend:/app/backend

  # ---- Frontend (React + Nginx) ----
  frontend:
    build:
      context: ../../frontend/web-react
      dockerfile: ../../deploy/easy/frontend.dockerfile
    container_name: vicoo-frontend
    restart: unless-stopped
    # environment:
    #   VITE_API_BASE_URL: /api/v1
    #   CHOKIDAR_USEPOLLING: "true"  # Enable file watching in container
    ports:
      - "80:80"
      # - "5173:5173"  # Vite dev server port
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vicoo-net
    # volumes:
    #   # Mount source code for hot reload
    #   - ../../frontend/web-react:/app
    #   - /app/node_modules  # Preserve node_modules

  # ---- Admin Dashboard (React + Nginx) ----
  admin:
    build:
      context: ../../
      dockerfile: deploy/easy/admin.dockerfile
    container_name: vicoo-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ | head -1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vicoo-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  vicoo-net:
    driver: bridge
    name: vicoo-network
